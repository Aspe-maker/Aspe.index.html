<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Satellite Simulator</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

#info{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-family:Arial;
    background:rgba(0,0,0,.5);
    padding:10px;
    border-radius:10px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

</head>

<body>

<div id="info">
🛰️ حرك القمر الصناعي بأسهم الاتجاهات
</div>

<script>

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x000011);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
2000
);

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(
renderer.domElement
);

////////////////////////////////////////////////////
// اضاءة
////////////////////////////////////////////////////

const ambient =
new THREE.AmbientLight(
0xffffff,
1.5
);

scene.add(ambient);

const sun =
new THREE.DirectionalLight(
0xffffff,
2
);

sun.position.set(
100,
100,
100
);

scene.add(sun);

////////////////////////////////////////////////////
// الأرض
////////////////////////////////////////////////////

const EARTH_RADIUS = 20;

const earthGeometry =
new THREE.SphereGeometry(
EARTH_RADIUS,
64,
64
);

const earthMaterial =
new THREE.MeshPhongMaterial({
color:0x2c8c3c
});

const earth =
new THREE.Mesh(
earthGeometry,
earthMaterial
);

scene.add(earth);

////////////////////////////////////////////////////
// مباني فوق سطح الأرض
////////////////////////////////////////////////////

function createBuilding(
latitude,
longitude,
height
){

const building =
new THREE.Mesh(

new THREE.BoxGeometry(
1,
height,
1
),

new THREE.MeshPhongMaterial({
color:0x999999
})

);

const lat =
THREE.MathUtils.degToRad(
90-latitude
);

const lon =
THREE.MathUtils.degToRad(
longitude
);

const x =
(EARTH_RADIUS + height/2)
*
Math.sin(lat)
*
Math.cos(lon);

const y =
(EARTH_RADIUS + height/2)
*
Math.cos(lat);

const z =
(EARTH_RADIUS + height/2)
*
Math.sin(lat)
*
Math.sin(lon);

building.position.set(
x,y,z
);

building.lookAt(0,0,0);

building.rotateX(
Math.PI/2
);

scene.add(building);

}

////////////////////////////////////////////////////
// مدينة كاملة
////////////////////////////////////////////////////

for(let i=0;i<100;i++){

createBuilding(

Math.random()*180-90,

Math.random()*360,

Math.random()*4+2

);

}

////////////////////////////////////////////////////
// القمر الصناعي
////////////////////////////////////////////////////

const satellite =
new THREE.Mesh(

new THREE.BoxGeometry(
1,
1,
2
),

new THREE.MeshPhongMaterial({
color:0xffffff
})

);

scene.add(satellite);

let orbitRadius = 35;

let orbitAngle = 0;

let orbitHeight = 5;

////////////////////////////////////////////////////
// تحكم اللاعب
////////////////////////////////////////////////////

const keys = {};

document.addEventListener(
"keydown",
e=>{

keys[e.key]=true;

}
);

document.addEventListener(
"keyup",
e=>{

keys[e.key]=false;

}
);

////////////////////////////////////////////////////
// نجوم
////////////////////////////////////////////////////

const starGeometry =
new THREE.BufferGeometry();

const starVertices = [];

for(let i=0;i<5000;i++){

starVertices.push(

(Math.random()-0.5)*2000,
(Math.random()-0.5)*2000,
(Math.random()-0.5)*2000

);

}

starGeometry.setAttribute(

'position',

new THREE.Float32BufferAttribute(
starVertices,
3
)

);

const stars =
new THREE.Points(

starGeometry,

new THREE.PointsMaterial({
size:2,
color:0xffffff
})

);

scene.add(stars);

////////////////////////////////////////////////////
// تحديث
////////////////////////////////////////////////////

function animate(){

requestAnimationFrame(
animate
);

if(keys["ArrowLeft"])
orbitAngle -= 0.01;

if(keys["ArrowRight"])
orbitAngle += 0.01;

if(keys["ArrowUp"])
orbitRadius -= 0.2;

if(keys["ArrowDown"])
orbitRadius += 0.2;

orbitRadius =
Math.max(
25,
Math.min(
orbitRadius,
80
)
);

satellite.position.x =
Math.cos(orbitAngle)
*
orbitRadius;

satellite.position.z =
Math.sin(orbitAngle)
*
orbitRadius;

satellite.position.y =
orbitHeight;

////////////////////////////////////////////////////
// الكاميرا مثبتة بالقمر الصناعي
////////////////////////////////////////////////////

camera.position.copy(
satellite.position
);

camera.lookAt(
earth.position
);

earth.rotation.y += 0.001;

renderer.render(
scene,
camera
);

}

animate();

window.addEventListener(
"resize",
()=>{

camera.aspect =
window.innerWidth/
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

}
);

</script>

</body>
</html>
