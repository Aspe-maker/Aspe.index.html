<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Satellite Simulator</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
touch-action:none;
}

#info{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:Arial;
background:rgba(0,0,0,.5);
padding:10px;
border-radius:10px;
z-index:100;
}

canvas{
display:block;
}

</style>
</head>

<body>

<div id="info">
🛰️ حرك إصبعك للدوران حول الأرض
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene();

scene.background =
new THREE.Color(0x000010);

const camera =
new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer =
new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(
renderer.domElement
);





const ambient =
new THREE.AmbientLight(
0xffffff,
1.2
);

scene.add(ambient);

const sun =
new THREE.DirectionalLight(
0xffffff,
2
);

sun.position.set(
20,
20,
20
);

scene.add(sun);





const earthGeometry =
new THREE.SphereGeometry(
10,
64,
64
);

const earthMaterial =
new THREE.MeshStandardMaterial({

color:0x3366ff

});

const earth =
new THREE.Mesh(
earthGeometry,
earthMaterial
);

scene.add(earth);





function addBuilding(
lat,
lon,
height
){

const building =
new THREE.Mesh(

new THREE.BoxGeometry(
0.5,
height,
0.5
),

new THREE.MeshStandardMaterial({
color:0xaaaaaa
})

);

const phi =
(90-lat)*
Math.PI/180;

const theta =
(lon+180)*
Math.PI/180;

const radius =
10;

const x =
-radius*
Math.sin(phi)*
Math.cos(theta);

const y =
radius*
Math.cos(phi);

const z =
radius*
Math.sin(phi)*
Math.sin(theta);

building.position.set(
x,
y,
z
);

building.lookAt(
0,
0,
0
);

building.rotateX(
Math.PI/2
);

building.translateY(
height/2
);

scene.add(
building
);

}





for(let i=0;i<80;i++){

addBuilding(

Math.random()*180-90,

Math.random()*360-180,

Math.random()*2+0.5

);

}





const satellite =
new THREE.Mesh(

new THREE.BoxGeometry(
1,
1,
2
),

new THREE.MeshStandardMaterial({

color:0xffffff

})

);

scene.add(
satellite
);





let orbitRadius = 18;

let angleX = 0;

let angleY = 0;





let dragging = false;

let lastX = 0;

let lastY = 0;

document.addEventListener(
"pointerdown",
e=>{

dragging=true;

lastX=e.clientX;

lastY=e.clientY;

}
);

document.addEventListener(
"pointerup",
()=>{

dragging=false;

}
);

document.addEventListener(
"pointermove",
e=>{

if(!dragging)
return;

angleY +=
(e.clientX-lastX)
*0.01;

angleX +=
(e.clientY-lastY)
*0.01;

angleX =
Math.max(
-1.4,
Math.min(
1.4,
angleX
)
);

lastX=e.clientX;
lastY=e.clientY;

}
);





function animate(){

requestAnimationFrame(
animate
);

earth.rotation.y +=
0.001;

const x =
orbitRadius*
Math.cos(angleX)*
Math.sin(angleY);

const y =
orbitRadius*
Math.sin(angleX);

const z =
orbitRadius*
Math.cos(angleX)*
Math.cos(angleY);

satellite.position.set(
x,
y,
z
);

satellite.lookAt(
0,
0,
0
);

camera.position.copy(
satellite.position
);

camera.lookAt(
0,
0,
0
);

renderer.render(
scene,
camera
);

}

animate();





window.addEventListener(
"resize",
()=>{

camera.aspect=
window.innerWidth/
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

}
);

</script>

</body>
</html>
