<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>حاسبة التوافق ❤️</title>

<style>

*{

    box-sizing:border-box;

    font-family:Arial;

}

body{

    margin:0;

    background:linear-gradient(135deg,#ff4d6d,#ff8fab);

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

}

.box{

    background:white;

    width:100%;

    max-width:350px;

    padding:25px;

    border-radius:20px;

    text-align:center;

    box-shadow:0 10px 25px rgba(0,0,0,0.2);

}

h2{

    margin-bottom:20px;

}

input{

    width:100%;

    padding:14px;

    margin-bottom:15px;

    border-radius:12px;

    border:2px solid #ddd;

    font-size:18px;

}

input:focus{

    outline:none;

    border-color:#ff4d6d;

}

button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#ff4d6d;

    color:white;

    font-size:18px;

    cursor:pointer;

}

#result{

    margin-top:20px;

    font-size:26px;

    font-weight:bold;

    color:#ff1744;

}

</style>

</head>

<body>

<div class="box">

<h2>❤️ حاسبة التوافق ❤️</h2>

<input type="text" id="name1" placeholder="اسمك">

<input type="text" id="name2" placeholder="اسم الحبيب">

<button onclick="calcLove()">احسب التوافق</button>

<div id="result"></div>

</div>

<script>

let firstTime = true;

function calcLove(){

    let name1 = document.getElementById("name1").value;

    let name2 = document.getElementById("name2").value;

    if(name1 === "" || name2 === ""){

        document.getElementById("result").innerHTML = "اكتب الاسمين 😑";

        return;

    }

    let percent;

    if(firstTime){

        percent = "1000000%";

        firstTime = false;

    }else{

        percent = Math.floor(Math.random()*101) + "%";

    }

    document.getElementById("result").innerHTML =

    `💖 نسبة التوافق بين ${name1} و ${name2} هي ${percent}`;

}

</script>

</body>

</html>
